name: gde
description: "Global Diaspora Events — find your people, find your events."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Backend
  supabase_flutter: ^2.9.0

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Utils
  url_launcher: ^6.3.1
  intl: ^0.20.2
  shared_preferences: ^2.3.4
  connectivity_plus: ^6.1.1
  uuid: ^4.5.1

  # Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  share_plus: ^12.0.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.1
  riverpod_lint: ^2.6.3

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
